  <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ranking y Sesiones - Pilas</title>
    <style>
        body { background: #1a2732; font-family: sans-serif; color: white; text-align: center; margin: 0; padding: 20px; }
        .card { background: #243447; max-width: 550px; margin: 20px auto; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #2f3e4f; font-size: 1.1em; align-items: center; }
        
        /* Estilos para el podio */
        .gold { color: #ffd700; font-weight: bold; }
        .silver { color: #c0c0c0; font-weight: bold; }
        .bronze { color: #cd7f32; font-weight: bold; }
        .medal-icon { font-size: 1.3em; margin-right: 8px; }

        .fecha-btn { display: block; padding: 15px; color: #4fc3f7; text-decoration: none; border-bottom: 1px solid #2f3e4f; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .fecha-btn:hover { background: #2f3e4f; color: #fff; }
        .hidden { display: none; }
        .back-link { color: #4fc3f7; text-decoration: none; font-size: 0.9em; margin: 20px 0; display: inline-block; cursor: pointer; border-bottom: 1px dotted; }
        h2 { border-bottom: 2px solid #4fc3f7; padding-bottom: 10px; color: #4fc3f7; }
    </style>
</head>
<body>

    <div id="vista-grupo">
        <h1 id="tit-grupo">🏆 Cargando...</h1>
        <a href="index.html" class="back-link">← Volver a la página principal</a>
        
        <div class="card">
            <h2>📊 Ranking por medias</h2>
            <div id="rank-gen"></div>
        </div>

        <div class="card">
            <h2>📅 Sesiones</h2>
            <div id="lista-sesiones"></div>
        </div>
    </div>

    <div id="vista-sesion" class="hidden">
        <h1 id="tit-sesion"></h1>
        <div onclick="volver()" class="back-link">← Volver al grupo</div>
        <div class="card"><div id="rank-sesion"></div></div>
    </div>

    <script>
        // ID definitivo corregido de tu captura
        const SHEET_ID = '1Uh-ixe2OZsqy-cDWGNGYczVrDKWwYrad35GHBiYBnLY';
        const params = new URLSearchParams(window.location.search);
        const hoja = params.get('hoja') || 'RANKING NEW YORK';
        let alumnosDb = [];

        fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(hoja)}`)
            .then(res => res.text())
            .then(data => {
                const json = JSON.parse(data.substring(47).slice(0, -2));
                const filas = json.table.rows;
                document.getElementById('tit-grupo').innerText = "🏆 " + hoja.replace("RANKING ", "");

                let sesiones = [];
                // AJUSTE: Ahora lee exactamente la fila 1 (que es la 2 de Excel) para pillar "ENERO SEMANA..."
                for(let i=6; i<=23; i++) {
                    let nombre = (filas[0] && filas[0].c[i]) ? filas[0].c[i].v : null;
                    if(nombre) {
                        sesiones.push({ nombre, col: i });
                        document.getElementById('lista-sesiones').innerHTML += 
                            `<div class="fecha-btn" onclick="verSesion('${nombre}', ${i})">${nombre}</div>`;
                    }
                }

                // Procesamos nicks y notas
                for(let i=2; i<filas.length; i++) {
                    let nick = (filas[i].c[5]) ? filas[i].c[5].v : null;
                    if(!nick) continue;
                    let notas = sesiones.map(s => (filas[i].c[s.col] && typeof filas[i].c[s.col].v === 'number') ? filas[i].c[s.col].v : 0);
                    let validas = notas.filter(n => n > 0);
                    let media = validas.length ? (validas.reduce((a,b)=>a+b,0) / validas.length) : 0;
                    alumnosDb.push({ nick, media, fila: filas[i].c });
                }

                const renderRanking = (datos, contenedor, esMedia) => {
                    const medals = ['🥇', '🥈', '🥉'];
                    const classes = ['gold', 'silver', 'bronze'];
                    contenedor.innerHTML = "";
                    
                    datos.forEach((al, idx) => {
                        let icono = idx < 3 ? `<span class="medal-icon">${medals[idx]}</span>` : `${idx + 1}`;
                        let clasePodio = idx < 3 ? classes[idx] : '';
                        let valor = esMedia ? al.media.toFixed(1) : al.nota;
                        
                        contenedor.innerHTML += `
                            <div class="row">
                                <span class="${clasePodio}">${icono} &nbsp; ${al.nick}</span>
                                <span class="${clasePodio}">${valor}</span>
                            </div>`;
                    });
                };

                // Ranking General ordenado
                alumnosDb.sort((a,b) => b.media - a.media);
                renderRanking(alumnosDb, document.getElementById('rank-gen'), true);

                window.verSesion = (nombre, col) => {
                    document.getElementById('vista-grupo').classList.add('hidden');
                    document.getElementById('vista-sesion').classList.remove('hidden');
                    document.getElementById('tit-sesion').innerText = "🎧 " + nombre;
                    let rS = alumnosDb.map(al => ({ nick: al.nick, nota: (al.fila[col] ? al.fila[col].v : 0) }))
                        .filter(a => a.nota > 0).sort((a,b) => b.nota - a.nota);
                    renderRanking(rS, document.getElementById('rank-sesion'), false);
                };
            });

        window.volver = () => {
            document.getElementById('vista-sesion').classList.add('hidden');
            document.getElementById('vista-grupo').classList.remove('hidden');
        };
    </script>
</body>
</html>
